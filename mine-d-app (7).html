const fmtTime = (ts) => {
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;

};

function CommunityTab() {
  const [posts, setPosts] = useState([]);
  const [showWrite, setShowWrite] = useState(false);
  const [userName, setUserName] = useState('');

  useEffect(() => {
    const profile = safeGet('profile:info');
    let n = profile?.nickname || safeGet('user:name');
    if (!n) {
      n = '익명' + Math.floor(Math.random() * 1000);
      safeSet('user:name', n);
    }
    setUserName(n);
    const list = safeGet('community:posts') || [];
    setPosts(list.sort((a, b) => b.ts - a.ts));
  }, []);

  const addPost = (text, weightLoss) => {
    const post = {
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 8),
      author: userName, text, weightLoss, ts: Date.now(),
      likes: 0, likedBy: [], comments: [],
    };
    const next = [post, ...posts];
    setPosts(next);
    safeSet('community:posts', next);
  };

  const toggleLike = (id) => {
    const next = posts.map((p) => {
      if (p.id !== id) return p;
      const liked = (p.likedBy || []).includes(userName);
      return { ...p,
        likedBy: liked ? p.likedBy.filter((n) => n !== userName) : [...(p.likedBy || []), userName],
        likes: liked ? p.likes - 1 : p.likes + 1 };
    });
    setPosts(next);
    safeSet('community:posts', next);
  };

  const addComment = (id, text) => {
    const next = posts.map((p) =>
      p.id === id ? { ...p, comments: [...(p.comments || []), { id: Date.now(), author: userName, text, ts: Date.now() }] } : p
    );
    setPosts(next);
    safeSet('community:posts', next);
  };

  return (
    <div className="px-5">
      <div className="rounded-2xl p-4 mb-3 relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #0E2A21 0%, #1F4A3D 65%, #2D5F4F 100%)' }}>
        <div className="absolute -right-6 -top-6 w-28 h-28 rounded-full opacity-10" style={{ background: '#D4B468' }} />
        <div className="relative">
          <div className="text-[15px] font-semibold mb-1" style={{ color: '#D4B468' }}>🌿 체험단 커뮤니티</div>
          <div className="text-[21px] font-bold leading-snug" style={{ color: '#FCFAF5' }}>
            지금 함께 다이어트 중인<br />멤버들의 기록을 만나보세요
          </div>
          <div className="text-[14px] mt-2 opacity-80" style={{ color: '#FCFAF5' }}>
            내 닉네임: <span className="font-bold">{userName}</span>
          </div>
        </div>
      </div>

      <button onClick={() => setShowWrite(true)} className="w-full rounded-2xl p-3.5 mb-4 flex items-center gap-3"
        style={{ background: '#FFFFFF', border: '1px solid #D5CBB0' }}>
        <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: '#1F4A3D' }}>
          <Plus size={18} color="#D4B468" strokeWidth={2.5} />
        </div>
        <div className="flex-1 text-left text-[16px]" style={{ color: '#888' }}>오늘의 다이어트 후기를 나눠보세요...</div>
      </button>

      {posts.length === 0 ? (
        <div className="rounded-2xl p-8 text-center" style={{ background: '#FFFFFF', border: '1px dashed #D5D3C5' }}>
          <div className="text-3xl mb-2">💬</div>
          <div className="text-[18px] font-semibold mb-1" style={{ color: '#0A0A0A' }}>아직 글이 없어요</div>
          <div className="text-[15px]" style={{ color: '#888' }}>첫 후기를 남겨보세요!</div>
        </div>
      ) : (
        <div className="space-y-3">
          {posts.map((p) => (
            <PostCard key={p.id} post={p} userName={userName}
              onLike={() => toggleLike(p.id)} onComment={(t) => addComment(p.id, t)} />
          ))}
        </div>
      )}

      {showWrite && (
        <WritePostModal userName={userName} onClose={() => setShowWrite(false)}
          onSave={(text, wl) => { addPost(text, wl); setShowWrite(false); }} />
      )}
    </div>
  );
}

function PostCard({ post, userName, onLike, onComment }) {
  const [showComments, setShowComments] = useState(false);
  const [commentText, setCommentText] = useState('');
  const liked = (post.likedBy || []).includes(userName);

  const handleComment = () => {
    const t = commentText.trim();
    if (!t) return;
    onComment(t);
    setCommentText('');
  };

  return (
    <div className="rounded-2xl p-4" style={{ background: '#FFFFFF', border: '1px solid #D5CBB0' }}>
      <div className="flex items-center gap-2 mb-3">
        <div className="w-9 h-9 rounded-full flex items-center justify-center text-[16px] font-bold" style={{ background: '#E8DDC2', color: '#1F4A3D' }}>{post.author.slice(0, 2)}</div>
        <div className="flex-1">
          <div className="text-[16px] font-bold" style={{ color: '#0A0A0A' }}>{post.author}</div>
          <div className="text-[14px]" style={{ color: '#888' }}>{fmtTime(post.ts)}</div>
        </div>
        {post.weightLoss && (
          <div className="px-2.5 py-1 rounded-full text-[14px] font-bold flex items-center gap-1" style={{ background: '#1F4A3D', color: '#D4B468' }}>
            <TrendingDown size={12} strokeWidth={3} />{post.weightLoss}kg
          </div>
        )}
      </div>
      <div className="text-[18px] leading-relaxed mb-3 whitespace-pre-wrap" style={{ color: '#0A0A0A' }}>{post.text}</div>
      <div className="flex items-center gap-4 pt-3 border-t" style={{ borderColor: '#E8DDC2' }}>
        <button onClick={onLike} className="flex items-center gap-1.5">
          <Heart size={18} color={liked ? '#D85A7B' : '#888'} fill={liked ? '#D85A7B' : 'none'} />
          <span className="text-[15px] font-semibold" style={{ color: liked ? '#D85A7B' : '#888' }}>{post.likes}</span>
        </button>
        <button onClick={() => setShowComments(!showComments)} className="flex items-center gap-1.5">
          <MessageCircle size={18} color="#888" />
          <span className="text-[15px] font-semibold" style={{ color: '#888' }}>{(post.comments || []).length}</span>
        </button>
      </div>

      {showComments && (
        <div className="mt-3 pt-3 border-t" style={{ borderColor: '#E8DDC2' }}>
          {(post.comments || []).map((c) => (
            <div key={c.id} className="flex gap-2 mb-2">
              <div className="w-7 h-7 rounded-full flex items-center justify-center text-[14px] font-bold flex-shrink-0" style={{ background: '#E8DDC2', color: '#1F4A3D' }}>{c.author.slice(0, 2)}</div>
              <div className="flex-1 rounded-2xl px-3 py-2" style={{ background: '#FCFAF5' }}>
                <div className="text-[14px] font-bold" style={{ color: '#0A0A0A' }}>{c.author}</div>
                <div className="text-[15px]" style={{ color: '#2A2A2A' }}>{c.text}</div>
              </div>
            </div>
          ))}
          <div className="flex gap-2 mt-2">
            <input type="text" value={commentText} onChange={(e) => setCommentText(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && handleComment()} placeholder="댓글 달기..."
              className="flex-1 px-3 py-2 rounded-full text-[15px] outline-none"
              style={{ background: '#FCFAF5', border: '1px solid #D5CBB0' }} />
            <button onClick={handleComment} disabled={!commentText.trim()}
              className="px-3 rounded-full text-[14px] font-bold disabled:opacity-40"
              style={{ background: '#1F4A3D', color: '#D4B468' }}>등록</button>
          </div>
        </div>
      )}
    </div>
  );
}

function WritePostModal({ userName, onClose, onSave }) {
  const [text, setText] = useState('');

  const handleSave = () => {

    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background: 'rgba(0,0,0,0.4)' }} onClick={onClose}>

        <div className="flex items-center gap-2 mb-4">
          <div className="w-9 h-9 rounded-full flex items-center justify-center text-[16px] font-bold" style={{ background: '#E8DDC2', color: '#1F4A3D' }}>{userName.slice(0, 2)}</div>

        <button onClick={handleSave} disabled={!text.trim()}

function GuideTab() {
  const [subTab, setSubTab] = useState('schedule');

    const c = safeGet(`detox:${todayKey()}`) || {};

  }, []);

  const toggleCheck = (id) => {

    setChecked(next);
    safeSet(`detox:${todayKey()}`, next);

  const consumed = SCHEDULE.reduce((sum, s) => sum + (checked[s.id] ? s.amount : 0), 0);
  const doneCount = SCHEDULE.filter((s) => checked[s.id]).length;
  const pct = Math.round((consumed / TOTAL_ML) * 100);

  return (
    <div>

        <p className="text-[18px] font-semibold leading-relaxed mt-2" style={{ color: '#0A0A0A' }}>

        <span className="text-[22px] font-bold" style={{ color: '#B8B5A5' }}>+</span>
        <FormulaPiece num="2L" label="정제수" />

          <div className="mt-2 h-1.5 rounded-full overflow-hidden" style={{ background: '#E8DDC2' }}>

          <div className="flex justify-between mt-2.5">
            {SCHEDULE.map((s) => (
              <div key={s.id} className="w-7 h-7 rounded-full flex items-center justify-center text-[14px] font-bold transition-all"
                style={{ background: checked[s.id] ? '#1F4A3D' : '#E8DDC2',

          <div className="text-[24px] font-bold mb-1" style={{ color: '#D4B468' }}>1-DAY 디톡스 완주!</div>
          <div className="text-[16px] leading-relaxed opacity-90" style={{ color: '#FCFAF5' }}>
            오늘 하루 디톡스를 모두 마치셨어요.<br />당신의 몸이 새롭게 리셋되고 있습니다.
          </div>
        </div>
      )}

      <div className="px-5 mb-4">
        <div className="flex gap-1 p-1 rounded-2xl" style={{ background: '#DFD5B8' }}>
          <SubTabBtn active={subTab === 'schedule'} onClick={() => setSubTab('schedule')}>디톡스 가이드</SubTabBtn>
          <SubTabBtn active={subTab === 'science'} onClick={() => setSubTab('science')}>미네랄의 힘</SubTabBtn>

      {subTab === 'science' && <ScienceView />}

      <style>{`@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }`}</style>
    </div>
  );

function RecordTab() {
  const [profile, setProfile] = useState(null);
  const [before, setBefore] = useState(null);
  const [after, setAfter] = useState(null);
  const [editPhase, setEditPhase] = useState(null);
  const [showProfileEdit, setShowProfileEdit] = useState(false);

  useEffect(() => {
    setProfile(safeGet('profile:info'));
    setBefore(safeGet('diet:before'));
    setAfter(safeGet('diet:after'));
  }, []);

  const saveProfile = (info) => {
    setProfile(info);
    safeSet('profile:info', info);
    if (info.nickname) safeSet('user:name', info.nickname);
  };

  const savePhase = (phase, rec) => {
    const record = { ...rec, ts: Date.now() };
    if (phase === 'before') { setBefore(record); safeSet('diet:before', record); }
    else { setAfter(record); safeSet('diet:after', record); }
  };

  const resetPhase = (phase) => {
    if (phase === 'before') { setBefore(null); safeDelete('diet:before'); }
    else { setAfter(null); safeDelete('diet:after'); }
  };

  const bothFilled = before && after;

  return (
    <div className="px-5">
      <ProfileCard profile={profile} onEdit={() => setShowProfileEdit(true)} />

      <div className="rounded-2xl p-5 mb-3 relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #0E2A21 0%, #1F4A3D 65%, #2D5F4F 100%)' }}>
        <div className="absolute -right-10 -top-10 w-44 h-44 rounded-full opacity-10" style={{ background: '#D4B468' }} />
        <div className="relative">
          <div className="text-[15px] font-bold mb-1" style={{ color: '#D4B468' }}>🌿 1-DAY 다이어트</div>
          <div className="text-[23px] font-bold leading-snug" style={{ color: '#FCFAF5' }}>
            시작 전과 끝난 후의<br />변화를 기록해보세요
          </div>
          <div className="text-[14px] mt-2 opacity-80" style={{ color: '#FCFAF5' }}>
            체중·체지방·자신상태의 변화를 한눈에 비교
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3 mb-3">
        <PhaseSlot phase="before" record={before}
          onEdit={() => setEditPhase('before')} onReset={() => resetPhase('before')} />
        <PhaseSlot phase="after" record={after} afterEnabled={!!before}
          onEdit={() => setEditPhase('after')} onReset={() => resetPhase('after')} />
      </div>

      {!bothFilled && (
        <div className="rounded-2xl p-3.5 mb-3 flex items-start gap-2.5" style={{ background: '#F5E5B5', border: '1px solid #C9A961' }}>
          <div className="text-[22px] flex-shrink-0">💡</div>
          <div className="text-[15px] leading-relaxed" style={{ color: '#6B5520' }}>
            {!before ? '먼저 1-DAY 다이어트를 시작하기 전 상태를 기록해보세요. 디톡스가 끝난 후 비교할 수 있어요.'
              : '디톡스를 완료한 후 "끝난 후" 기록을 남기면 변화량이 자동으로 계산됩니다.'}
          </div>
        </div>
      )}

      {bothFilled && <ComparisonCard before={before} after={after} />}

      {editPhase && (
        <PhaseModal phase={editPhase} existing={editPhase === 'before' ? before : after}
          onClose={() => setEditPhase(null)}
          onSave={(rec) => { savePhase(editPhase, rec); setEditPhase(null); }} />
      )}

      {showProfileEdit && (
        <ProfileModal existing={profile} onClose={() => setShowProfileEdit(false)}
          onSave={(info) => { saveProfile(info); setShowProfileEdit(false); }} />
      )}
    </div>
  );
}

          <span className="text-[22px] leading-none">{emoji}</span>

            <div className="text-[11px] font-bold tracking-[1.5px]" style={{ color: dark ? '#D4B468' : '#888' }}>{subtitle}</div>
            <div className="text-[14px] font-bold leading-none" style={{ color: dark ? '#FCFAF5' : '#0A0A0A' }}>{label}</div>

        </div>
        <div className="flex items-center gap-1">
          <button onClick={onEdit} className="w-7 h-7 rounded-full flex items-center justify-center"
            style={{ background: dark ? 'rgba(212,180,104,0.2)' : 'rgba(31,74,61,0.1)' }}>
            <Pencil size={12} color={dark ? '#D4B468' : '#1F4A3D'} strokeWidth={2.5} />
          </button>
          <button onClick={onReset} className="w-7 h-7 rounded-full flex items-center justify-center"
            style={{ background: dark ? 'rgba(212,180,104,0.2)' : 'rgba(31,74,61,0.1)' }}>

      <div className="mb-3 mt-2">

          <div className="text-[30px] font-bold leading-none tracking-tight" style={{ color: dark ? '#D4B468' : '#0A0A0A' }}>{record.weight.toFixed(1)}</div>
          <div className="text-[13px]" style={{ color: dark ? 'rgba(252,250,245,0.7)' : '#888' }}>kg</div>
        </div>
        {record.bodyFat != null && (
          <div className="text-[13px] font-semibold mt-1" style={{ color: dark ? '#D4B468cc' : '#1F4A3D' }}>체지방 {record.bodyFat}%</div>
        )}

      <div className="grid grid-cols-1 gap-y-1 pt-2.5 border-t" style={{ borderColor: dark ? 'rgba(212,180,104,0.2)' : '#D5C896' }}>

function MiniRow({ label, value, dark }) {

}

function DotRating({ value, muted, dark, small }) {
  const size = small ? 5 : 7;
  return (
    <div className="flex items-center gap-0.5 flex-shrink-0">
      {[1, 2, 3, 4, 5].map((i) => (
        <div key={i} className="rounded-full" style={{ width: size, height: size,
          background: i <= (value || 0)
            ? (dark ? '#D4B468' : muted ? '#B5B0A0' : '#1F4A3D')
            : (dark ? 'rgba(212,180,104,0.25)' : '#EBE8DC') }} />
      ))}
    </div>
  );
}

function ComparisonCard({ before, after }) {
  return (
    <div className="rounded-2xl p-5 mb-3" style={{ background: '#FFFFFF', border: '1px solid #D5CBB0' }}>
      <div className="text-[18px] font-bold mb-1" style={{ color: '#0A0A0A' }}>📊 변화 비교</div>
      <div className="flex items-center gap-2 text-[14px] mb-4" style={{ color: '#888' }}>
        <span className="px-2 py-0.5 rounded-md font-semibold" style={{ background: '#E8DDC2', color: '#4A4A4A' }}>
          {fmtDate(new Date(before.ts).toISOString().slice(0, 10))}
        </span>
        <ArrowRight size={14} color="#888" />
        <span className="px-2 py-0.5 rounded-md font-semibold" style={{ background: '#1F4A3D', color: '#D4B468' }}>
          {fmtDate(new Date(after.ts).toISOString().slice(0, 10))}
        </span>
      </div>
      <CompareRow label="체중" before={before.weight} after={after.weight} unit="kg" lowerIsBetter />
      <CompareRow label="체지방률" before={before.bodyFat} after={after.bodyFat} unit="%" lowerIsBetter />
      <div className="mt-4 pt-4 border-t" style={{ borderColor: '#E8DDC2' }}>
        <div className="text-[15px] font-bold mb-1" style={{ color: '#4A4A4A' }}>자신상태 변화</div>
        <div className="text-[12px] mb-3" style={{ color: '#999' }}>1 = 매우 안좋음 → 5 = 매우 좋음</div>
        {STATE_ITEMS.map((item) => (
          <StateCompareRow key={item.key} label={item.label}
            before={before[item.key]} after={after[item.key]} higherIsBetter />
        ))}
      </div>
    </div>
  );
}

function CompareRow({ label, before, after, unit, lowerIsBetter }) {
  if (before == null || after == null) return null;
  const diff = (after - before).toFixed(1);
  const isImprovement = lowerIsBetter ? diff < 0 : diff > 0;
  const isSame = parseFloat(diff) === 0;
  return (
    <div className="flex items-center justify-between py-2">
      <div className="text-[16px] font-semibold w-20" style={{ color: '#4A4A4A' }}>{label}</div>
      <div className="flex-1 flex items-center justify-center gap-2">
        <span className="text-[19px] font-bold" style={{ color: '#999' }}>{before.toFixed(1)}</span>
        <ArrowRight size={14} color="#888" />
        <span className="text-[22px] font-bold" style={{ color: '#0A0A0A' }}>{after.toFixed(1)}</span>
        <span className="text-[14px]" style={{ color: '#888' }}>{unit}</span>
      </div>
      <div className="text-[14px] font-bold px-2 py-0.5 rounded-md flex items-center gap-0.5 w-20 justify-center"
        style={{ background: isSame ? '#E8DDC2' : isImprovement ? '#B5DECC' : '#F0C5D2',
          color: isSame ? '#888' : isImprovement ? '#1F5F44' : '#C44' }}>
        {!isSame && (diff < 0 ? <TrendingDown size={12} strokeWidth={3} /> : <TrendingUp size={12} strokeWidth={3} />)}
        {Math.abs(diff)}
      </div>
    </div>
  );
}

function StateCompareRow({ label, before, after, higherIsBetter }) {
  if (before == null || after == null) return null;
  const diff = after - before;
  const isImprovement = higherIsBetter ? diff > 0 : diff < 0;
  const isSame = diff === 0;
  return (
    <div className="flex items-center justify-between py-1.5 gap-2">
      <div className="text-[14px] font-semibold flex-shrink-0" style={{ color: '#4A4A4A', width: 110 }}>{label}</div>
      <div className="flex-1 flex items-center justify-center gap-2">
        <DotRating value={before} muted />
        <ArrowRight size={12} color="#888" />
        <DotRating value={after} />
      </div>
      <div className="text-[13px] font-bold px-1.5 py-0.5 rounded-md text-center flex-shrink-0"
        style={{ background: isSame ? '#E8DDC2' : isImprovement ? '#B5DECC' : '#F0C5D2',
          color: isSame ? '#888' : isImprovement ? '#1F5F44' : '#C44', minWidth: 48 }}>
        {isSame ? '동일' : (diff > 0 ? '+' : '') + diff}
      </div>
    </div>
  );
}

            </div>
            <div>
              <div className="text-[15px] font-semibold mb-1.5" style={{ color: '#4A4A4A' }}>성별</div>
              <div className="grid grid-cols-3 gap-1.5">
                {GENDER_OPTIONS.map((g) => (
                  <button key={g.value} onClick={() => setGender(g.value)}
                    className="py-3 rounded-2xl text-[14px] font-bold transition-all"
                    style={{ background: gender === g.value ? '#1F4A3D' : '#FFFFFF',
                      color: gender === g.value ? '#D4B468' : '#4A4A4A',
                      border: '1.5px solid', borderColor: gender === g.value ? '#1F4A3D' : '#D5CBB0' }}>{g.label}</button>
                ))}
              </div>
            </div>
          </div>
          <div>
            <div className="text-[15px] font-semibold mb-1.5" style={{ color: '#4A4A4A' }}>전화번호 (선택)</div>
            <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)}
              placeholder="010-0000-0000" maxLength={20}
              className="w-full px-4 py-3 rounded-2xl text-[18px] font-bold outline-none"
              style={{ background: '#FFFFFF', border: '1.5px solid #D5CBB0', color: '#0A0A0A' }} />
          </div>
        </div>
        <button onClick={handleSave} disabled={!nickname.trim()}
          className="w-full py-4 rounded-2xl text-[19px] font-bold disabled:opacity-40 mt-6"
          style={{ background: '#1F4A3D', color: '#D4B468' }}>
          {existing ? '수정하기' : '저장하기'}
        </button>
      </div>
    </div>
  );
}

function PhaseModal({ phase, existing, onClose, onSave }) {
  const isBefore = phase === 'before';
  const title = isBefore ? '1-DAY 다이어트 시작 전' : '1-DAY 다이어트 끝난 후';
  const subtitle = isBefore ? '디톡스를 시작하기 전 상태를 기록해주세요' : '디톡스 완료 후 변화를 기록해주세요';

  const [weight, setWeight] = useState(existing?.weight?.toString() || '');
  const [bodyFat, setBodyFat] = useState(existing?.bodyFat?.toString() || '');
  const [states, setStates] = useState(() => {
    const init = {};
    STATE_ITEMS.forEach((item) => { init[item.key] = existing?.[item.key] || 3; });
    return init;
  });
  const [note, setNote] = useState(existing?.note || '');

  const updateState = (key, val) => setStates({ ...states, [key]: val });

  const handleSave = () => {
    const w = parseFloat(weight);
    if (!w || w < 20 || w > 300) return;
    const bf = parseFloat(bodyFat);
    onSave({ weight: w, bodyFat: bf > 0 && bf < 70 ? bf : null, ...states, note: note.trim() });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background: 'rgba(0,0,0,0.4)' }} onClick={onClose}>
      <div className="w-full max-w-[440px] rounded-t-3xl p-6 pb-10 max-h-[92vh] overflow-y-auto"
        style={{ background: '#FCFAF5' }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-start justify-between mb-5">
          <div>
            <div className="inline-block px-2 py-0.5 rounded-md text-[13px] font-bold tracking-[1.5px] mb-1.5"
              style={{ background: isBefore ? '#E8DDC2' : '#1F4A3D', color: isBefore ? '#4A4A4A' : '#D4B468' }}>
              {isBefore ? 'BEFORE' : 'AFTER'}
            </div>
            <div className="text-[22px] font-bold" style={{ color: '#0A0A0A' }}>{title}</div>
            <div className="text-[15px] mt-1" style={{ color: '#888' }}>{subtitle}</div>
          </div>
          <button onClick={onClose}><X size={22} color="#888" /></button>
        </div>

        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <div className="text-[15px] font-semibold mb-1.5" style={{ color: '#4A4A4A' }}>체중 (kg)</div>
            <input type="number" step="0.1" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="65.5" autoFocus
              className="w-full px-3 py-3 rounded-2xl text-[22px] font-bold outline-none"
              style={{ background: '#FFFFFF', border: '1.5px solid #D5CBB0', color: '#0A0A0A' }} />
          </div>
          <div>
            <div className="text-[15px] font-semibold mb-1.5" style={{ color: '#4A4A4A' }}>체지방률 (%)</div>
            <input type="number" step="0.1" value={bodyFat} onChange={(e) => setBodyFat(e.target.value)} placeholder="22.5"
              className="w-full px-3 py-3 rounded-2xl text-[22px] font-bold outline-none"
              style={{ background: '#FFFFFF', border: '1.5px solid #D5CBB0', color: '#0A0A0A' }} />
          </div>
        </div>

        <div className="mb-5">
          <div className="text-[16px] font-bold mb-1" style={{ color: '#0A0A0A' }}>자신상태 체크</div>
          <div className="flex items-center justify-between text-[13px] mb-3 px-1" style={{ color: '#888' }}>
            <span><b style={{ color: '#C44' }}>1</b> 매우 안좋음</span>
            <span>매우 좋음 <b style={{ color: '#1F5F44' }}>5</b></span>
          </div>
          <div className="rounded-2xl p-4 space-y-4" style={{ background: '#FFFFFF', border: '1px solid #D5CBB0' }}>
            {STATE_ITEMS.map((item) => (
              <StateSlider key={item.key} label={item.label} value={states[item.key]}
                onChange={(v) => updateState(item.key, v)} />
            ))}
          </div>
        </div>

        <div className="mb-6">
          <div className="text-[15px] font-semibold mb-2" style={{ color: '#4A4A4A' }}>한 줄 메모 (선택)</div>
          <input type="text" value={note} onChange={(e) => setNote(e.target.value)} maxLength={50}
            placeholder={isBefore ? '예: 오늘 시작! 화이팅' : '예: 부기가 확실히 줄었어요'}
            className="w-full px-4 py-3 rounded-2xl text-[18px] outline-none"
            style={{ background: '#FFFFFF', border: '1.5px solid #D5CBB0', color: '#0A0A0A' }} />
        </div>

        <button onClick={handleSave} disabled={!weight || isNaN(parseFloat(weight))}
          className="w-full py-4 rounded-2xl text-[19px] font-bold disabled:opacity-40"
          style={{ background: '#1F4A3D', color: '#D4B468' }}>
          {existing ? '수정하기' : '저장하기'}
        </button>
      </div>
    </div>
  );
}

function StateSlider({ label, value, onChange }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-1.5">
        <div className="text-[16px] font-semibold" style={{ color: '#0A0A0A' }}>{label}</div>
        <div className="text-[14px] font-bold" style={{ color: value <= 2 ? '#C44' : value >= 4 ? '#1F5F44' : '#888' }}>{value} / 5</div>
      </div>
      <div className="flex items-center gap-1">
        {[1, 2, 3, 4, 5].map((i) => (
          <button key={i} onClick={() => onChange(i)}
            className="flex-1 h-11 rounded-lg transition-all flex items-center justify-center"
            style={{ background: i <= value ? '#1F4A3D' : '#E8DDC2', color: i <= value ? '#D4B468' : '#999' }}>
            <span className="text-[15px] font-bold">{i}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================
const rootEl = document.getElementById('root');
rootEl.innerHTML = '';
createRoot(rootEl).render(<App />);
</script>
</body>
</html>
